<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
  <g stroke="#5a3500" stroke-width="1.6" fill="#ffb703">
    <!-- Elephant body -->
    <rect x="10" y="18" width="25" height="12" rx="3"/>
    <!-- Head & trunk -->
    <path d="M10 24 C6 24, 6 30, 12 30 C14 30, 16 28, 18 28 C16 26, 14 24, 12 24 Z"/>
    <path d="M18 28 C20 32, 24 33, 28 33" stroke="#5a3500" stroke-width="1.4" fill="none"/>
    <!-- Ear -->
    <ellipse cx="14" cy="22" rx="4" ry="5" fill="#ffb703" stroke="#5a3500"/>
    <!-- Legs -->
    <rect x="12" y="30" width="4" height="3" fill="#ffb703" stroke="#5a3500"/>
    <rect x="25" y="30" width="4" height="3" fill="#ffb703" stroke="#5a3500"/>
    <!-- Eye -->
    <circle cx="13" cy="21" r="0.9" fill="#5a3500"/>
  </g>
</svg>