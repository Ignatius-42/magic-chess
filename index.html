<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicChess Arena</title>
    
    <!-- Core CSS for Chessboard Layout -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        /* Premium Midnight Lab Dark Mode Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121824;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #87ceeb;
            margin-bottom: 5px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(135, 206, 235, 0.3);
        }

        .subtitle {
            color: #a0aec0;
            margin-bottom: 25px;
        }

        .game-layout {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            align-items: stretch;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: 480px;
        }

        .player-tag {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 12px;
            background: #1a2333;
            border: 1px solid #2d3748;
            border-radius: 6px;
            margin: 8px 0;
            color: #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #board {
            width: 480px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 4px solid #1a2333;
        }

        /* --- MAGIC CHESSBOARD CUSTOM THEME --- */
        .white-1e1d7 { background-color: #ffffff !important; }
        .black-3c85d { background-color: #87ceeb !important; }

        /* Olive Green Triangle for Empty Legal Moves */
        .suggest-move { position: relative; }
        .suggest-move::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 14px solid #769656;
            z-index: 10;
            pointer-events: none;
        }

        /* Pink Background Target for Legal Captures */
        .suggest-capture {
            background-color: #ffb6c1 !important;
            box-shadow: inset 0 0 15px rgba(255, 182, 193, 0.8) !important;
        }

        /* Side Control Panel */
        .side-hud {
            flex: 1;
            background: #1a2333;
            border: 1px solid #2d3748;
            padding: 25px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            max-width: 320px;
        }

        .hud-section h3 {
            margin-top: 0;
            color: #87ceeb;
            border-bottom: 2px solid #2d3748;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .mode-toggle {
            display: flex;
            background: #121824;
            padding: 4px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #2d3748;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #a0aec0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .mode-btn.active {
            background: #87ceeb;
            color: #121824;
            box-shadow: 0 2px 8px rgba(135, 206, 235, 0.4);
        }

        .timer-box {
            font-size: 2rem;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .timer-active {
            background-color: #2f855a !important;
            color: #fff;
        }
        .timer-deactive {
            background-color: #9b2c2c !important;
            color: #e2e8f0;
            opacity: 0.6;
        }

        .status-text {
            font-size: 1.1rem;
            background: #121824;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #87ceeb;
            margin-bottom: 20px;
        }

        .btn-restart {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            background: #87ceeb;
            color: #121824;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>

    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
</head>
<body>

    <h1>♟️ MagicChess</h1>
    <div class="subtitle">Designed by a Master Game Architect</div>

    <div class="game-layout">
        <div class="board-container">
            <div class="player-tag" id="top-tag">🤖 Top Player <div id="black-clock" class="timer-box timer-deactive" style="font-size:1.1rem; padding:4px 10px; margin:0;">10:00</div></div>
            <div id="board"></div>
            <div class="player-tag" id="bottom-tag">👤 Bottom Player <div id="white-clock" class="timer-box timer-deactive" style="font-size:1.1rem; padding:4px 10px; margin:0;">10:00</div></div>
        </div>

        <div class="side-hud">
            <div class="hud-section">
                <h3>Battle HUD</h3>
                <div class="mode-toggle">
                    <button id="mode-bot" class="mode-btn active" onclick="changeGameMode('bot')">🤖 vs Computer</button>
                    <button id="mode-pvp" class="mode-btn" onclick="changeGameMode('pvp')">👥 vs Friend</button>
                </div>
                <div id="status" class="status-text">White's Turn! Select a piece to view magic paths.</div>
                <div style="margin-top: 20px;">
                    <div style="font-size: 0.9rem; color: #a0aec0; margin-bottom: 5px;">Active Turn Clock:</div>
                    <div id="master-timer" class="timer-box timer-active">10:00</div>
                </div>
            </div>
            <button class="btn-restart" onclick="resetMagicMatch()">🔄 Restart Magic Match</button>
        </div>
    </div>

    <script>
        var game = new Chess();
        var board = null;
        var stockfishWorker = null;
        var gameMode = 'bot'; 
        var whiteTime = 600;
        var blackTime = 600;
        var timerInterval = null;

        // Points directly to our newly created local file to bypass browser security blocks!
        function initStockfishEngine() {
            if (stockfishWorker) stockfishWorker.terminate();
            
            try {
                stockfishWorker = new Worker('stockfish-worker.js');
                stockfishWorker.onmessage = function(event) {
                    if (event.data.startsWith("bestmove")) {
                        var bestMove = event.data.split(" ")[1];
                        game.move({
                            from: bestMove.substring(0, 2),
                            to: bestMove.substring(2, 4),
                            promotion: 'q'
                        });
                        board.position(game.fen());
                        removeMagicHighlights();
                        updateStatusMessages();
                        updateLabelsAndClocks();
                    }
                };
            } catch (e) {
                console.error("Worker initialization failed:", e);
            }
        }

        function changeGameMode(mode) {
            gameMode = mode;
            document.getElementById('mode-bot').className = (mode === 'bot') ? "mode-btn active" : "mode-btn";
            document.getElementById('mode-pvp').className = (mode === 'pvp') ? "mode-btn active" : "mode-btn";
            resetMagicMatch();
        }

        function updateLabelsAndClocks() {
            function formatTime(seconds) {
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                return (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
            }
            
            let wStr = formatTime(whiteTime);
            let bStr = formatTime(blackTime);
            
            document.getElementById('white-clock').innerText = wStr;
            document.getElementById('black-clock').innerText = bStr;
            
            if (game.turn() === 'w') {
                document.getElementById('master-timer').innerText = wStr;
                document.getElementById('white-clock').className = "timer-box timer-active";
                document.getElementById('black-clock').className = "timer-box timer-deactive";
            } else {
                document.getElementById('master-timer').innerText = bStr;
                document.getElementById('white-clock').className = "timer-box timer-deactive";
                document.getElementById('black-clock').className = "timer-box timer-active";
            }
        }

        function startClockEngine() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                if (game.game_over()) { clearInterval(timerInterval); return; }
                if (game.turn() === 'w') {
                    whiteTime--;
                } else {
                    blackTime--;
                }
                updateLabelsAndClocks();
            }, 1000);
        }

        function removeMagicHighlights() {
            $('#board .square-55d63').removeClass('suggest-move suggest-capture');
        }

        function showMagicHighlights(square) {
            var moves = game.moves({ square: square, verbose: true });
            if (moves.length === 0) return;
            moves.forEach(function(move) {
                var $square = $('#board .square-' + move.to);
                if (move.captured) {
                    $square.addClass('suggest-capture');
                } else {
                    $square.addClass('suggest-move');
                }
            });
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (gameMode === 'bot' && piece.search(/^b/) !== -1) return false;
            removeMagicHighlights();
            showMagicHighlights(source);
        }

        function makeStockfishMove() {
            if (game.game_over() || gameMode !== 'bot' || !stockfishWorker) return;
            document.getElementById('status').innerText = "🔮 Stockfish is thinking...";
            stockfishWorker.postMessage("position startpos moves " + game.history({ verbose: true }).map(m => m.from + m.to).join(' '));
            stockfishWorker.postMessage("go depth 10"); 
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) { removeMagicHighlights(); return 'snapback'; }

            removeMagicHighlights();
            board.position(game.fen());
            if (!timerInterval) startClockEngine();
            updateStatusMessages();
            updateLabelsAndClocks();

            if (gameMode === 'bot') {
                window.setTimeout(makeStockfishMove, 250);
            }
        }

        function updateStatusMessages () {
            var status = (game.turn() === 'w') ? "Your Turn (White)!" : "Stockfish Thinking...";
            if (game.in_checkmate()) status = "Game Over: Checkmate!";
            else if (game.in_draw()) status = "Game Over: Draw!";
            document.getElementById('status').innerText = status;
        }

        function resetMagicMatch() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            game = new Chess();
            whiteTime = 600;
            blackTime = 600;
            board.start();
            removeMagicHighlights();
            initStockfishEngine();
            updateStatusMessages();
            updateLabelsAndClocks();
        }

        // Direct, high-speed open CDN for the pieces layout
        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('board', config);
        initStockfishEngine();
        updateLabelsAndClocks();
    </script>
</body>
</html>
