<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geronimo's Great Cheese Chess Adventure!</title>
    
    <!-- Core CSS for Chessboard Layout -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        /* Bright, Energetic, Playful Kid-Friendly Background */
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka One', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff9e6; /* Soft cream/parchment color like an old adventure map */
            color: #4a2c00; /* Deep chocolate brown text instead of harsh black */
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff6f00; /* Vibrant Cheddar Orange */
            margin-bottom: 5px;
            font-size: 2.8rem;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #ffcc00;
            text-align: center;
        }

        .subtitle {
            color: #8d5b00;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 25px;
            background: #ffe699;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px dashed #ff6f00;
        }

        .game-layout {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: 480px;
        }

        .player-tag {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 15px;
            background: #ffffff;
            border: 3px solid #ffb300;
            border-radius: 12px;
            margin: 10px 0;
            color: #4a2c00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 0px #ffb300;
        }

        #board {
            width: 480px;
            box-shadow: 0 12px 0px #d4a373, 0 16px 25px rgba(0,0,0,0.15);
            border-radius: 16px;
            overflow: hidden;
            border: 6px solid #8d5b00; /* Sturdy wooden border */
        }

        /* ================= GERONIMO'S CHEESE BOARD THEME ================= */
        /* Forces the squares into delicious cheese colors! */
        .white-1e1d7 { 
            background-color: #fffdf0 !important; /* Creamy Swiss Cheese White */
        }
        .black-3c85d { 
            background-color: #ffb703 !important; /* Golden Cheddar Cheese Yellow */
        }

        /* Fun Bubbles for Legal Moves */
        .suggest-move { position: relative; }
        .suggest-move::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background-color: rgba(74, 194, 154, 0.6); /* Friendly green bubble */
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
            border: 2px solid #2a9d8f;
        }

        /* Red Target for Capturing an Opponent */
        .suggest-capture {
            box-shadow: inset 0 0 0 6px #e76f51 !important;
            background-color: #f4a261 !important;
        }

        /* Side Control Panel styled like an Adventure Log */
        .side-hud {
            flex: 1;
            background: #ffffff;
            border: 4px solid #ff6f00;
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            max-width: 320px;
            box-shadow: 0 8px 0px #ff6f00, 0 12px 20px rgba(0,0,0,0.1);
            min-height: 400px;
        }

        .hud-section h3 {
            margin-top: 0;
            color: #ff6f00;
            border-bottom: 3px dashed #ffb300;
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-align: center;
        }

        .mode-toggle {
            display: flex;
            background: #fff3cd;
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid #ffcc00;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #a05a00;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .mode-btn.active {
            background: #ff6f00;
            color: #ffffff;
            box-shadow: 0 4px 0px #b34e00;
        }

        .timer-box {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid rgba(0,0,0,0.1);
        }
        .timer-active {
            background-color: #4bc05f !important;
            color: white;
            box-shadow: 0 4px 0px #379247;
        }
        .timer-deactive {
            background-color: #e0e0e0 !important;
            color: #777777;
            box-shadow: 0 4px 0px #b5b5b5;
        }

        .status-text {
            font-size: 1.1rem;
            background: #fff9e6;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ffb300;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .btn-restart {
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            background: #4bc05f; /* Friendly Go-Green */
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0px #379247;
            transition: transform 0.1s;
        }
        .btn-restart:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #379247;
        }
    </style>

    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
</head>
<body>

    <h1>🧀 Geronimo's Cheese Chess Arena! 🐭</h1>
    <div class="subtitle">Fabumouse Chess Training Lab</div>

    <div class="game-layout">
        <div class="board-container">
            <div class="player-tag" id="top-tag">🤖 Stockfish Bot <div id="black-clock" class="timer-box timer-deactive" style="font-size:1.1rem; padding:4px 10px; margin:0;">10:00</div></div>
            <div id="board"></div>
            <div class="player-tag" id="bottom-tag">🧀 Future Grandmaster <div id="white-clock" class="timer-box timer-deactive" style="font-size:1.1rem; padding:4px 10px; margin:0;">10:00</div></div>
        </div>

        <div class="side-hud">
            <div class="hud-section">
                <h3>Adventure Log</h3>
                <div class="mode-toggle">
                    <button id="mode-bot" class="mode-btn active" onclick="changeGameMode('bot')">🤖 Play Bot</button>
                    <button id="mode-pvp" class="mode-btn" onclick="changeGameMode('pvp')">👥 Pass & Play</button>
                </div>
                <div id="status" class="status-text">Your Turn! Click a piece to discover its secret legal paths! 🌟</div>
                <div style="margin-top: 15px;">
                    <div style="font-size: 0.9rem; color: #a05a00; font-weight: bold; margin-bottom: 5px; text-align: center;">⏰ Turn Timer:</div>
                    <div id="master-timer" class="timer-box timer-active">10:00</div>
                </div>
            </div>
            <button class="btn-restart" onclick="resetMagicMatch()">🏁 New Adventure!</button>
        </div>
    </div>

    <script>
        var game = new Chess();
        var board = null;
        var stockfishWorker = null;
        var gameMode = 'bot'; 
        var whiteTime = 600;
        var blackTime = 600;
        var timerInterval = null;

        function initStockfishEngine() {
            if (stockfishWorker) stockfishWorker.terminate();
            try {
                stockfishWorker = new Worker('stockfish-worker.js');
                stockfishWorker.onmessage = function(event) {
                    if (event.data.startsWith("bestmove")) {
                        var bestMove = event.data.split(" ")[1];
                        game.move({
                            from: bestMove.substring(0, 2),
                            to: bestMove.substring(2, 4),
                            promotion: 'q'
                        });
                        board.position(game.fen());
                        removeMagicHighlights();
                        updateStatusMessages();
                        updateLabelsAndClocks();
                    }
                };
            } catch (e) {
                console.error("Engine issue:", e);
            }
        }

        function changeGameMode(mode) {
            gameMode = mode;
            document.getElementById('mode-bot').className = (mode === 'bot') ? "mode-btn active" : "mode-btn";
            document.getElementById('mode-pvp').className = (mode === 'pvp') ? "mode-btn active" : "mode-btn";
            resetMagicMatch();
        }

        function updateLabelsAndClocks() {
            function formatTime(seconds) {
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                return (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
            }
            let wStr = formatTime(whiteTime);
            let bStr = formatTime(blackTime);
            document.getElementById('white-clock').innerText = wStr;
            document.getElementById('black-clock').innerText = bStr;
            
            if (game.turn() === 'w') {
                document.getElementById('master-timer').innerText = wStr;
                document.getElementById('white-clock').className = "timer-box timer-active";
                document.getElementById('black-clock').className = "timer-box timer-deactive";
            } else {
                document.getElementById('master-timer').innerText = bStr;
                document.getElementById('white-clock').className = "timer-box timer-deactive";
                document.getElementById('black-clock').className = "timer-box timer-active";
            }
        }

        function startClockEngine() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                if (game.game_over()) { clearInterval(timerInterval); return; }
                if (game.turn() === 'w') {
                    whiteTime--;
                } else {
                    blackTime--;
                }
                updateLabelsAndClocks();
            }, 1000);
        }

        function removeMagicHighlights() {
            $('#board .square-55d63').removeClass('suggest-move suggest-capture');
        }

        function showMagicHighlights(square) {
            var moves = game.moves({ square: square, verbose: true });
            if (moves.length === 0) return;
            moves.forEach(function(move) {
                var $square = $('#board .square-' + move.to);
                if (move.captured) {
                    $square.addClass('suggest-capture');
                } else {
                    $square.addClass('suggest-move');
                }
            });
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (gameMode === 'bot' && piece.search(/^b/) !== -1) return false;
            removeMagicHighlights();
            showMagicHighlights(source);
        }

        function makeStockfishMove() {
            if (game.game_over() || gameMode !== 'bot' || !stockfishWorker) return;
            document.getElementById('status').innerText = "🤔 The bot is looking for a fabumouse move...";
            stockfishWorker.postMessage("position startpos moves " + game.history({ verbose: true }).map(m => m.from + m.to).join(' '));
            stockfishWorker.postMessage("go depth 10"); 
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) { removeMagicHighlights(); return 'snapback'; }

            removeMagicHighlights();
            board.position(game.fen());
            if (!timerInterval) startClockEngine();
            updateStatusMessages();
            updateLabelsAndClocks();

            if (gameMode === 'bot') {
                window.setTimeout(makeStockfishMove, 250);
            }
        }

        function updateStatusMessages () {
            var status = (game.turn() === 'w') ? "Your turn! Go catch 'em! 🌟" : "The Bot is calculating... ⚡";
            if (game.in_checkmate()) status = "Checkmate! What a fabumouse victory! 🏆";
            else if (game.in_draw()) status = "It's a draw! Spectacular defense! 🤝";
            document.getElementById('status').innerText = status;
        }

        function resetMagicMatch() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            game = new Chess();
            whiteTime = 600;
            blackTime = 600;
            board.start();
            removeMagicHighlights();
            initStockfishEngine();
            updateStatusMessages();
            updateLabelsAndClocks();
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('board', config);
        initStockfishEngine();
        updateLabelsAndClocks();
    </script>
</body>
</html>
